<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzttpFhHFVRRI7uvzo3pzW81Zs-3NAPP0A2gMEZFZdyoN2m0Z-fkeriQBkxvAP_V6QK9Q/exec";

    // ฟังก์ชันหลักในการติดต่อกับ Google (เปลี่ยนจาก google.script.run)
    async function callGAS(data, method = 'POST') {
        const url = (method === 'GET') ? `${GAS_URL}?${new URLSearchParams(data)}` : GAS_URL;
        const options = {
            method: method,
            mode: 'cors'
        };
        if (method === 'POST') options.body = JSON.stringify(data);

        const response = await fetch(url, options);
        return await response.json();
    }

    // --- ส่วนการโหลดข้อมูล Config เมื่อเปิดหน้าเว็บ ---
    document.addEventListener('DOMContentLoaded', async function() {
        showLoading(true);
        try {
            departmentData = await callGAS({ action: 'getDepartmentData' }, 'GET');
            const affiliations = Object.keys(departmentData);
            
            // Populate Dropdowns
            ['recorder-affiliation', 'executive-affiliation', 'search-affiliation', 'dashboard-affiliation-filter'].forEach(id => {
                const select = document.getElementById(id);
                if (select) affiliations.forEach(aff => select.appendChild(new Option(aff, aff)));
            });

            initializeDepartmentChart();
            initializeTopicsChart();
            initializeChannelsChart();
            initializeAudienceChart();
            fetchAndRenderData();
        } catch (error) {
            Swal.fire('Error', 'เชื่อมต่อข้อมูลไม่สำเร็จ: ' + error.message, 'error');
        } finally {
            showLoading(false);
        }
    });

    // --- ส่วนการบันทึกข้อมูล ---
    document.getElementById('communication-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        try {
            if (!validateFinalSubmission()) return;
            showLoading(true);

            // 1. อัปโหลดไฟล์
            const fileUrls = await uploadEvidenceFiles(); // ฟังก์ชันนี้ให้เปลี่ยนไปใช้ callGAS ข้างในด้วย

            // 2. ส่งข้อมูลบันทึก
            const formData = collectFormData(fileUrls);
            const result = await callGAS({ action: 'saveData', formData: formData }, 'POST');
            
            if (result.status === 'success') {
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลและส่งอีเมลยืนยันเรียบร้อยแล้ว', 'success');
                resetForm();
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
        } finally {
            showLoading(false);
        }
    });

    // --- ฟังก์ชันดึงข้อมูลตาราง ---
    async function fetchAndRenderData() {
        try {
            const result = await callGAS({ action: 'getSheetData' }, 'GET');
            if (result.status === 'success') {
                ALL_DATA = result.data.map(row => {
                    const record = {};
                    result.headers.forEach((header, index) => { record[header] = row[index]; });
                    return record;
                });
                currentFilteredData = ALL_DATA;
                displayPaginatedData();
                updateDashboard(ALL_DATA);
            }
        } catch (e) { console.error(e); }
    }
</script>
