<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานแผนการสื่อสารผู้บริหาร ปีงบประมาณ 2569</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- CSS ต้นฉบับ (Purple Gradient) --- */
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #2c3e50; color: white; padding: 25px; text-align: center; }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .tab { flex: 1; padding: 15px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; border-bottom: 4px solid transparent; }
        .tab.active { background: white; border-bottom-color: #3498db; color: #2c3e50; }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }
        
        /* Step Indicator */
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 10px; }
        .step { flex: 1; text-align: center; padding: 12px; background: #fff; border-radius: 8px; font-weight: 600; color: #6c757d; border: 2px solid #e9ecef; }
        .step.active { border-color: #3498db; color: #3498db; background: #ebf5fb; }
        .step.completed { background: #27ae60; color: white; border-color: #27ae60; }

        /* Form Styling */
        .form-section { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 12px; border: 1px solid #e9ecef; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; text-align: left; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #2c3e50; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        
        /* Dynamic Topic Items */
        .topic-item { border: 1px solid #ddd; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #fdfdfd; position: relative; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px; font-weight: bold; color: #3498db; }
        .remove-btn { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; }
        
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; padding: 15px; background: #f4f7f6; border-radius: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .sub-section { margin-top: 15px; padding: 15px; border-left: 4px solid #3498db; background: #f0f7ff; border-radius: 0 8px 8px 0; }

        .btn { padding: 12px 25px; border-radius: 8px; cursor: pointer; border: none; font-size: 16px; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .hidden { display: none; }
        
        /* Table & Tags */
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; margin-top: 15px; }
        th { background: #34495e; color: white; padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin: 2px; color: white; }
    </style>
</head>

        </header>
        
        <nav class="tabs">

            <button class="tab" id="tab-dash-btn" onclick="showTab('dashboard')">Dashboard</button>
        </nav>

        <div id="form-tab" class="tab-content active">

                <div class="step active" id="step1">1. ผู้บันทึก
